name: CI

# Required status check for branch protection on `main`.
# The job name `pipeline` matches the phantomyard org convention so the
# standard branch-protection ruleset (`contexts: ["pipeline"]`) applies.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pipeline:
    name: pipeline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: twilio-voice-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: twilio-voice-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js

      - name: Syntax check (email-triage Python)
        working-directory: email-triage
        run: python3 -m py_compile inbox-poll.py inbox-mail.py
